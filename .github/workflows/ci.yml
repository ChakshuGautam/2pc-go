name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Start infrastructure
        run: docker compose up -d --wait --wait-timeout 60

      - name: Pre-create topic
        run: docker compose exec redpanda rpk topic create orders.events --partitions 1

      - name: Apply schema
        run: PGPASSWORD=demo psql -h localhost -U demo -d demo -f schema.sql

      - name: Build
        run: go build -o 2pc-go .

      - name: Start server
        run: |
          ./2pc-go > /tmp/server.log 2>&1 &
          sleep 2
        env:
          DATABASE_URL: postgres://demo:demo@localhost:5432/demo?sslmode=disable
          KAFKA_BROKER: localhost:29092

      - name: Create an order
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST http://localhost:8090/orders \
            -H 'Content-Type: application/json' \
            -d '{"item": "widget", "qty": 3}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Status: $HTTP_CODE"
          echo "Body: $BODY"
          [ "$HTTP_CODE" = "201" ] || exit 1

      - name: Wait for outbox worker to publish
        run: sleep 5

      - name: Verify order in database
        run: |
          COUNT=$(PGPASSWORD=demo psql -h localhost -U demo -d demo -t -c "SELECT count(*) FROM orders;")
          echo "Orders: $COUNT"
          [ "$(echo $COUNT | tr -d ' ')" = "1" ] || exit 1

      - name: Verify outbox was drained
        run: |
          UNPUBLISHED=$(PGPASSWORD=demo psql -h localhost -U demo -d demo -t -c "SELECT count(*) FROM outbox WHERE published_at IS NULL;")
          echo "Unpublished outbox rows: $UNPUBLISHED"
          [ "$(echo $UNPUBLISHED | tr -d ' ')" = "0" ] || exit 1

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Server logs ==="
          cat /tmp/server.log || true
          echo ""
          echo "=== Outbox rows ==="
          PGPASSWORD=demo psql -h localhost -U demo -d demo -c "SELECT id, topic, key, published_at, created_at FROM outbox;" || true

      - name: Teardown
        if: always()
        run: docker compose down
